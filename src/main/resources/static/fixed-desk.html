<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pao De Kuai - Playing Desk</title>
    <style>
        /* ... existing styles ... */
        
        /* Connection Overlay */
        #connection-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .connection-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }
        
        /* Hidden state */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Connection Overlay (initially visible) -->
    <div id="connection-overlay">
        <div class="connection-content">
            <h1 style="color: #2c5530; margin-bottom: 20px;">Pao De Kuai</h1>
            <div style="margin: 20px 0;">
                <label>Your Name:</label><br>
                <input type="text" id="player-name" value="Human Player" style="padding: 10px; margin: 10px; width: 200px; font-size: 16px;">
            </div>
            <div style="margin: 20px 0;">
                <button onclick="start3PlayerGame()" style="background: #4CAF50; color: white; padding: 15px 30px; margin: 10px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
                    Start 3-Player Game<br>(You + 2 AI)
                </button>
                <button onclick="start4PlayerGame()" style="background: #2196F3; color: white; padding: 15px 30px; margin: 10px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
                    Start 4-Player Game<br>(You + 3 AI)
                </button>
            </div>
            <div id="connection-status" style="margin-top: 20px; padding: 10px; border-radius: 5px;"></div>
        </div>
    </div>

    <!-- Game Container (initially hidden) -->
    <div class="game-container hidden">
        <div class="game-table">
            <!-- ... game table content ... -->
        </div>
    </div>

    <!-- ... rest of the script ... -->
    
    <script>
        // ... existing script ...
        
        function hideConnectionScreen() {
            console.log('Hiding connection screen');
            document.getElementById('connection-overlay').classList.add('hidden');
            document.querySelector('.game-container').classList.remove('hidden');
            statusBarEl.style.display = 'block';
            gameControlsEl.style.display = 'flex';
        }
        
        // Show connection screen initially
        // (it's already visible by default, no need to show it)
    </script>
</body>
</html>
