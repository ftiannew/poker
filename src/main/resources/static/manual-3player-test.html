<!DOCTYPE html>
<html>
<head>
    <title>3-Player Game Manual Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .player { 
            margin: 10px 0; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        }
        .card-count {
            font-weight: bold;
            color: #28a745;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>3-Player Game Manual Test</h1>
    
    <div class="status" id="status">Click button to start 3-player game</div>
    
    <button onclick="start3PlayerGame()">Start 3-Player Game (Human + 2 AI)</button>
    
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        function start3PlayerGame() {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status';
            statusDiv.innerHTML = 'Connecting to server...';
            
            const socket = new SockJS('http://localhost:8082/game');
            const stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                statusDiv.innerHTML = 'Connected! Starting 3-player game...';
                
                stompClient.subscribe('/topic/game.started', function(message) {
                    const gameState = JSON.parse(message.body);
                    
                    // Verify 3 players with 17 cards each
                    let verificationResult = '<h3>✅ 3-Player Game Started Successfully!</h3>';
                    verificationResult += '<ul>';
                    
                    if (gameState.players.length === 3) {
                        verificationResult += '<li>✅ 3 players created</li>';
                    } else {
                        verificationResult += `<li>❌ Expected 3 players, got ${gameState.players.length}</li>`;
                    }
                    
                    let allPlayersHave17Cards = true;
                    gameState.players.forEach(player => {
                        const handSize = gameState.playerHands[player.id]?.length || 0;
                        if (handSize === 17) {
                            verificationResult += `<li>✅ ${player.name}: <span class="card-count">17 cards</span></li>`;
                        } else {
                            verificationResult += `<li>❌ ${player.name}: ${handSize} cards (expected 17)</li>`;
                            allPlayersHave17Cards = false;
                        }
                    });
                    
                    const totalCards = Object.values(gameState.playerHands)
                        .reduce((sum, hand) => sum + (hand?.length || 0), 0);
                    if (totalCards === 51) {
                        verificationResult += '<li>✅ Total cards: 51 (Spade 2 removed for 3-player game)</li>';
                    } else {
                        verificationResult += `<li>❌ Total cards: ${totalCards} (expected 51)</li>`;
                    }
                    
                    verificationResult += '</ul>';
                    
                    if (allPlayersHave17Cards && gameState.players.length === 3 && totalCards === 51) {
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = '🎉 3-PLAYER GAME VERIFICATION PASSED!';
                    } else {
                        statusDiv.className = 'status error';
                        statusDiv.innerHTML = '❌ Verification failed';
                    }
                    
                    document.getElementById('result').innerHTML = verificationResult;
                });
                
                // Create players
                const players = [
                    {id: 'human-' + Math.random().toString(36).substr(2, 9), name: 'Human Player'},
                    {id: 'ai-1-' + Math.random().toString(36).substr(2, 9), name: 'AI Player 1'},
                    {id: 'ai-2-' + Math.random().toString(36).substr(2, 9), name: 'AI Player 2'}
                ];
                
                stompClient.send('/app/game/start-direct', {}, JSON.stringify(players));
                
            }, function(error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Connection failed: ' + error;
            });
        }
    </script>
</body>
</html>
